spring:
  application:
    name: incident-intelligence-service
  threads:
    virtual:
      enabled: true
  kafka:
    listener:
      observation-enabled: true   # creates a span per Kafka message so traceId/spanId appear in MDC

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  kafka:
    topics:
      batch-events: batch.events.v1

aws:
  dynamodb:
    endpoint: http://localhost:8000 #use the DynamoDB endpoint from AWS management console in production environment
    region: us-east-1
  credentials:
    access-key-id: local #read from external source in production
    secret-access-key: local #read from external source in production

logging:
  level:
    io.batchintel: INFO
    org.springframework.kafka: WARN
