spring:
  application:
    name: incident-intelligence-service
  threads:
    virtual:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  kafka:
    topics:
      batch-events: batch.events.v1

logging:
  level:
    io.batchintel: INFO
    org.springframework.kafka: WARN
