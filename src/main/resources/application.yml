spring:
  application:
    name: incident-intelligence-service
  threads:
    virtual:
      enabled: true
  kafka:
    listener:
      observation-enabled: true   #creates a span per Kafka message so traceId/spanId appear in MDC

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  kafka:
    topics:
      batch-events: batch.events.v1
      batch-events-retry: batch.events.v1.retry
      batch-events-dlq: batch.events.v1.dlq
      incidents: incidents.v1 #not creating retry and dlq topics due to low volume of messages

resilience4j:
  circuitbreaker:
    instances:
      llm-provider: # name should match CircuitBreaker bean
        slidingWindowSize: 10 # track the last 10 calls
        failureRateThreshold: 50 # if ≥50% of those 10 calls fail → trip open
        waitDurationInOpenState: 30s # stay open for 30 seconds (Gemini gets time to recover)
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true # expose state at /actuator/health (OPEN/CLOSED/HALF_OPEN)
      slack-notifier:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 20s
        registerHealthIndicator: true

incident:
  anomaly:
    detector: ewma           # ewma | isolation-forest; ewma is the zero-dependency default
    threshold: 3.5           # z-score threshold for EWMA; anomaly score (0–1) for Isolation Forest
    ewma:
      alpha: 0.2             # smoothing factor — higher = more weight on recent observations
    isolation-forest:
      trees: 100             # number of isolation trees; more = stable scores, higher memory
      sample-size: 256       # sub-sample size per tree

aws:
  dynamodb:
    endpoint: http://localhost:8000 #use the DynamoDB endpoint from AWS management console in production environment
    region: us-east-1
  credentials:
    access-key-id: local #read from AWS Secrets Manager in production
    secret-access-key: local #read from AWS Secrets Manager in production
