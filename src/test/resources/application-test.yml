spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:localhost:9999}
    listener:
      auto-startup: false   # prevent @KafkaListener from connecting during @SpringBootTest
  threads:
    virtual:
      enabled: false

aws:
  dynamodb:
    endpoint: ${AWS_DYNAMODB_ENDPOINT:http://localhost:9999}
    region: ${AWS_REGION:us-east-1}
  credentials:
    access-key-id: ${AWS_ACCESS_KEY_ID:local}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:local}

incident:
  llm:
    provider: noop
  notify:
    provider: noop
  persistence:
    idempotency: memory
  anomaly:
    detector: ewma  # EWMA needs no external data; prevents ModelBootstrap from scanning DDB in tests

langchain4j:
  google-ai-gemini:
    api-key: test-disabled
    model-name: test-disabled

