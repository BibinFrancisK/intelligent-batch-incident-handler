spring:
  kafka:
    bootstrap-servers: localhost:9999
    listener:
      auto-startup: false   # prevent @KafkaListener from connecting during @SpringBootTest
  threads:
    virtual:
      enabled: false

aws:
  dynamodb:
    endpoint: http://localhost:9999
    region: us-east-1
  credentials:
    access-key-id: local
    secret-access-key: local

incident:
  llm:
    provider: noop
  notify:
    provider: noop
  persistence:
    idempotency: memory
  anomaly:
    detector: ewma  # EWMA needs no external data; prevents ModelBootstrap from scanning DDB in tests

